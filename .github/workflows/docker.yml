name: Build and Test SunPy

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t sunpy-test .

      - name: Run tests
        run: docker run --rm sunpy-test
```
